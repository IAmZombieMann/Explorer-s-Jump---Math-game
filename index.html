<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Aventura Matemática: Conteo y Posición</title>
    
    <style>
    /* Reset total para Mobile First */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        /* Bloquea selección de texto y zoom táctil */
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none; 
    }

    body, html {
        width: 100vw;
        height: 100vh;
        background-color: #1a1a2e;
        overflow: hidden; /* Elimina las barras de scroll */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #game-container {
        width: 100%;
        height: 100%;
        display: block; /* Importante para que Phaser calcule el tamaño bien */
    }

    /* Quitamos el borde redondeado y la sombra porque ahora es pantalla completa */
    canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
    }
</style>
</head>
<body>
    <div id="game-container"></div>
    
    <script type="module" src="src/main.js"></script>
</body>
</html>
