<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aventura Matemática</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; }
        body, html { width: 100vw; height: 100vh; background-color: #1a1a2e; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #game-container { width: 100%; height: 100%; }

        /* CAPA DE DESBLOQUEO PARA SAFARI */
        #audio-unlocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            font-family: 'Arial Black', sans-serif;
            text-align: center;
            cursor: pointer;
        }
        .icon { font-size: 80px; margin-bottom: 20px; animation: pulse 1s infinite yoyo; }
        .text { font-size: 32px; border: 4px solid #ef7c23; padding: 15px 30px; border-radius: 50px; background: #ef7c23; color: white; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="audio-unlocker">
        <div class="icon">👆</div>
        <div class="text">TOCA PARA EMPEZAR</div>
    </div>

    <div id="game-container"></div>
    <script type="module" src="src/main.js"></script>

    <script>
        // Función para desbloquear el audio desde el HTML
        const unlocker = document.getElementById('audio-unlocker');
        unlocker.addEventListener('click', () => {
            // 1. Crear un mensaje vacío para "despertar" a Safari
            const utterance = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(utterance);
            
            // 2. Marcar como desbloqueado globalmente
            window.audioIsUnlocked = true;
            
            // 3. Ocultar la capa
            unlocker.style.display = 'none';
        });
        
        // Lo mismo para touchstart (móviles)
        unlocker.addEventListener('touchstart', () => {
            const utterance = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(utterance);
            window.audioIsUnlocked = true;
            unlocker.style.display = 'none';
        }, { once: true });
    </script>
</body>
</html>
