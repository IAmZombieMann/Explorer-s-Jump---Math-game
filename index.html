<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aventura Matemática</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none; /* Vital para móviles */
        }

        body, html {
            width: 100vw;
            height: 100vh;
            background-color: #1a1a2e; /* Color de fondo oscuro de la app */
            overflow: hidden;
            
            /* AQUÍ ESTÁ EL FLEXBOX MAGISTRAL para centrar el juego */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            /* El contenedor toma todo el espacio, Phaser se adapta a él */
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estilo sutil para desktop para que no flote en la nada */
        @media (min-width: 1025px) {
            canvas {
                box-shadow: 0 0 40px rgba(0,0,0,0.8);
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
