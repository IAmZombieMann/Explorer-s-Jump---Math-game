<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Aventura Matemática: Conteo y Posición</title>
    
    <style>
        /* Evitamos que el usuario pueda seleccionar texto o elementos del juego */
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e; /* Color oscuro para que coincida con tu main.js */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            border-radius: 12px; /* Un poco más de redondeo para el estilo Ludic */
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <script type="module" src="src/main.js"></script>
</body>
</html>
